<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

  <title>Ứng dụng Kinh Dịch</title>

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#ffffff" />

  <link rel="apple-touch-icon" href="./icon.png" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Kinh Dịch" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: sans-serif;
      background: #fff;
      color: #333;

      --color-text-primary: #333;
      --color-text-secondary: #666;
      --color-text-tertiary: #999;

      --color-border-secondary: #ccc;
      --color-border-tertiary: #eee;

      --color-background-primary: #fff;
      --color-background-secondary: #f9f9f9;

      --border-radius-md: 8px;
      --border-radius-lg: 12px;
    }

    .kd-wrap {
      padding: 1rem;
      max-width: 380px;
      margin: auto;
    }

    .kd-header {
      text-align: center;
      margin-bottom: 1.2rem;
      padding-bottom: 1rem;
      border-bottom: 0.5px solid var(--color-border-tertiary);
    }

    .kd-header h1 {
      font-size: 20px;
      font-weight: 500;
      letter-spacing: 0.15em;
      margin-bottom: 2px;
    }

    .kd-header p {
      font-size: 12px;
      color: var(--color-text-secondary);
    }

    .method-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 1rem;
    }

    .method-btn {
      padding: 10px 8px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      text-align: center;
      transition: 0.2s;
      font-size: 13px;
    }

    .method-btn.active {
      background: #FAEEDA;
      border-color: #854F0B;
      color: #633806;
    }

    .question-area {
      margin-bottom: 1rem;
    }

    .question-area label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      color: #666;
    }

    .question-area textarea {
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 10px;
      resize: none;
      height: 70px;
      font-size: 13px;
    }

    .coin-section {
      text-align: center;
      margin-bottom: 1rem;
    }

    .coins-row {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 10px;
    }

    .coin {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      background: #f9f9f9;
    }

    .coin.heads {
      background: #FAEEDA;
      border-color: #EF9F27;
    }

    .coin.tails {
      background: #E6F1FB;
      border-color: #85B7EB;
    }

    .cast-btn,
    .ask-btn,
    .reset-btn {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
      border: none;
      font-size: 14px;
    }

    .cast-btn {
      background: #FAEEDA;
      border: 1px solid #854F0B;
      color: #633806;
    }

    .ask-btn {
      background: #f5f5f5;
    }

    .reset-btn {
      background: transparent;
      border: 1px solid #ddd;
    }

    .hidden {
      display: none;
    }

    .result-card {
      margin-top: 1rem;
      border: 1px solid #eee;
      border-radius: 12px;
      overflow: hidden;
    }

    .result-header {
      padding: 1rem;
      display: flex;
      gap: 12px;
      border-bottom: 1px solid #eee;
    }

    .que-symbol {
      font-size: 36px;
    }

    .result-section {
      padding: 1rem;
      border-bottom: 1px solid #eee;
    }

    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      color: #777;
      margin-bottom: 6px;
    }

    .section-text {
      font-size: 14px;
      line-height: 1.7;
    }

    .hao-item {
      padding: 6px 0;
      border-bottom: 1px solid #eee;
      font-size: 13px;
      line-height: 1.6;
    }
  </style>
</head>

<body>

<div class="kd-wrap">

  <div class="kd-header">
    <h1>易 經 · Kinh Dịch</h1>
    <p>Gieo quẻ · Luận hào · Xem vận</p>
  </div>

  <div id="input-phase">

    <div class="method-row">
      <div class="method-btn active"
           id="m-coin"
           onclick="setMethod('coin')">
        ☯<br>
        Gieo đồng tiền
      </div>

      <div class="method-btn"
           id="m-random"
           onclick="setMethod('random')">
        ✦<br>
        Ngẫu nhiên
      </div>
    </div>

    <div class="question-area">
      <label>Câu hỏi của bạn</label>

      <textarea
        id="question"
        placeholder="Ví dụ: Công việc sắp tới có thuận lợi không?"
      ></textarea>
    </div>

    <div class="coin-section" id="coin-ui">

      <div style="font-size:12px;color:#666">
        Bấm gieo 3 đồng xu — 6 lần
      </div>

      <div class="coins-row">
        <div class="coin" id="c0">？</div>
        <div class="coin" id="c1">？</div>
        <div class="coin" id="c2">？</div>
      </div>
    </div>

    <button class="cast-btn"
            id="cast-btn"
            onclick="castYao()">
      ☰ Gieo hào
    </button>
  </div>

  <div id="result-phase" class="hidden">

    <div class="result-card" id="result-card"></div>

    <button class="ask-btn" onclick="askMore()">
      Hỏi thêm về quẻ này
    </button>

    <button class="reset-btn" onclick="resetAll()">
      ↺ Gieo quẻ mới
    </button>
  </div>

</div>

<script>

const GUAS = [
  {
    name: "Kiền",
    zh: "乾",
    symbol: "☰",
    nature: "Trời · Dương cực",
    judgment: "Kiền: Đại cát. Tự cường không ngừng.",
    image: "Trời vận hành mạnh mẽ.",
    element: "Kim",
    direction: "Tây Bắc"
  },

  {
    name: "Khôn",
    zh: "坤",
    symbol: "☷",
    nature: "Đất · Âm cực",
    judgment: "Khôn: Thuận theo, bao dung.",
    image: "Đất dày chở vật.",
    element: "Thổ",
    direction: "Tây Nam"
  }
];

let method = "coin";
let yaos = [];

function setMethod(m) {

  method = m;

  document
    .getElementById("m-coin")
    .classList.toggle("active", m === "coin");

  document
    .getElementById("m-random")
    .classList.toggle("active", m === "random");
}

function castYao() {

  if (method === "random") {

    yaos = [];

    for (let i = 0; i < 6; i++) {
      yaos.push(Math.random() > 0.5 ? 1 : 0);
    }

  } else {

    if (yaos.length >= 6) return;

    const coins = [
      Math.random() > 0.5 ? 1 : 0,
      Math.random() > 0.5 ? 1 : 0,
      Math.random() > 0.5 ? 1 : 0
    ];

    ["c0", "c1", "c2"].forEach((id, i) => {

      const el = document.getElementById(id);

      el.textContent = coins[i] ? "陽" : "陰";

      el.className =
        "coin " + (coins[i] ? "heads" : "tails");
    });

    const sum = coins.reduce((a,b)=>a+b,0);

    yaos.push(sum >= 2 ? 1 : 0);
  }

  if (yaos.length >= 6) {
    showResult();
  }
}

function showResult() {

  const gua =
    yaos.filter(v=>v===1).length >= 3
      ? GUAS[0]
      : GUAS[1];

  document.getElementById("result-card").innerHTML = `
    <div class="result-header">
      <div class="que-symbol">${gua.symbol}</div>

      <div>
        <h2>Quẻ ${gua.name} ${gua.zh}</h2>

        <div style="font-size:12px;color:#666;margin-top:4px">
          ${gua.nature}
        </div>
      </div>
    </div>

    <div class="result-section">
      <div class="section-label">Quẻ từ</div>

      <div class="section-text">
        ${gua.judgment}
      </div>
    </div>

    <div class="result-section">
      <div class="section-label">Đại tượng</div>

      <div class="section-text">
        ${gua.image}
      </div>
    </div>
  `;

  document
    .getElementById("input-phase")
    .classList.add("hidden");

  document
    .getElementById("result-phase")
    .classList.remove("hidden");

  window._currentGua = gua;
}

function askMore() {

  const g = window._currentGua;

  if (!g) return;

  const text =
    `Quẻ ${g.name} (${g.zh}):\n\n` +
    `${g.judgment}\n\n` +
    `${g.image}`;

  alert(text);
}

function resetAll() {

  yaos = [];

  document
    .getElementById("question")
    .value = "";

  ["c0","c1","c2"].forEach(id => {

    const el = document.getElementById(id);

    el.textContent = "？";

    el.className = "coin";
  });

  document
    .getElementById("input-phase")
    .classList.remove("hidden");

  document
    .getElementById("result-phase")
    .classList.add("hidden");
}

/* PWA */

if ("serviceWorker" in navigator) {

  window.addEventListener("load", () => {

    navigator.serviceWorker
      .register("./sw.js")
      .then(() => console.log("SW registered"))
      .catch(err => console.log(err));
  });
}

</script>

</body>
</html>
